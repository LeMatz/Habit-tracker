<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sistema SHCE</title>
    <style>
        /* Estabilización para App Híbrida */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; 
            background-color: #f8fafc; /* Color claro por defecto en light mode */
            -webkit-text-size-adjust: 100%;
            transition: font-size 0.3s ease, background-color 0.3s ease;
        }

        /* Color de fondo oscuro sincronizado para soportar iOS Notch/Safe-Area */
        html.dark, html.dark body {
            background-color: #020617 !important;
        }
        
        /* Implementación de Fuente Grande */
        html.font-large {
            font-size: 1.2rem; /* Incrementa un poco más el tamaño base rem */
        }

        /* Auto-escalamiento retro-compatible para tamaños de fuente basados en píxeles fijos de Tailwind */
        html.font-large .text-\[6px\] { font-size: 8px !important; }
        html.font-large .text-\[6\.5px\] { font-size: 8.5px !important; }
        html.font-large .text-\[7px\] { font-size: 9px !important; }
        html.font-large .text-\[7\.5px\] { font-size: 9.5px !important; }
        html.font-large .text-\[8px\] { font-size: 10px !important; }
        html.font-large .text-\[8\.5px\] { font-size: 10.5px !important; }
        html.font-large .text-\[9px\] { font-size: 11px !important; }
        html.font-large .text-\[9\.5px\] { font-size: 11.5px !important; }
        html.font-large .text-\[10px\] { font-size: 12px !important; }
        html.font-large .text-\[10\.5px\] { font-size: 12.5px !important; }
        html.font-large .text-\[11px\] { font-size: 13px !important; }
        html.font-large .text-\[11\.5px\] { font-size: 13.5px !important; }
        html.font-large .text-\[12px\] { font-size: 14.5px !important; }
        html.font-large .text-\[13px\] { font-size: 15.5px !important; }
        html.font-large .text-\[14px\] { font-size: 16.5px !important; }

        #root {
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .native-scroll {
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-y: contain;
            flex: 1;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Clase robusta para modales con mucho texto */
        .modal-scroll {
            overflow-y: auto !important;
            -webkit-overflow-scrolling: touch !important;
            touch-action: pan-y !important;
            max-height: 100%;
        }
        .modal-scroll::-webkit-scrollbar { width: 4px; }
        .modal-scroll::-webkit-scrollbar-track { background: transparent; }
        .modal-scroll::-webkit-scrollbar-thumb { background: rgba(6, 182, 212, 0.3); border-radius: 10px; }

        body { font-family: 'Montserrat', sans-serif; }

        /* Ajustes específicos para fuente grande en componentes compactos */
        html.font-large .tracking-[0.4em] {
            tracking: 0.3em; /* Reducir tracking excesivo para evitar desbordes */
        }

        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-slow {
            animation: spin-slow 12s linear infinite;
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-50">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
